name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: choco install wixtoolset --yes --no-progress

      - name: Add WiX Toolset to PATH
        run: echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build MSI installer
        run: cargo wix --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipcode-windows-x86_64-installer
          path: target/wix/*.msi

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi
          name: ipcode-windows-x86_64-installer
