name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build Linux installers
        run: |
          cargo deb --no-build
          cargo generate-rpm

      - name: Build Arch Linux installer
        run: |
          git archive --format=tar.gz --output=/tmp/ipcode-src.tar.gz HEAD
          cp /tmp/ipcode-src.tar.gz packaging/arch/ipcode-src.tar.gz
          ARCH_SRC_SHA256="$(sha256sum packaging/arch/ipcode-src.tar.gz | awk '{print $1}')"
          sed -i "s/^sha256sums=.*/sha256sums=('${ARCH_SRC_SHA256}')/" packaging/arch/PKGBUILD
          docker run --rm -v "$PWD:/work" -w /work archlinux:latest bash -lc '
            pacman -Syu --noconfirm --needed base-devel rust cargo
            HOST_UID="$(stat -c "%u" /work)"
            HOST_GID="$(stat -c "%g" /work)"
            groupadd -f -g "$HOST_GID" builder
            if ! id -u builder >/dev/null 2>&1; then
              useradd -m -u "$HOST_UID" -g "$HOST_GID" builder
            fi
            cd /work/packaging/arch
            su builder -c "makepkg --noconfirm --cleanbuild --syncdeps"
          '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipcode-linux-x86_64-installers
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            packaging/arch/*.pkg.tar.zst

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            packaging/arch/*.pkg.tar.zst
          name: ipcode-linux-x86_64-installers
