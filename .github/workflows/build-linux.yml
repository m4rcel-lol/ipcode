name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build Linux installers
        run: |
          cargo deb --no-build
          cargo generate-rpm

      - name: Build Arch Linux installer
        run: |
          tar --exclude='./.git' --exclude='./target' --exclude='./packaging/arch/ipcode-src.tar.gz' -czf /tmp/ipcode-src.tar.gz .
          cp /tmp/ipcode-src.tar.gz packaging/arch/ipcode-src.tar.gz
          docker run --rm -v "$PWD:/work" -w /work archlinux:latest bash -lc '
            pacman -Syu --noconfirm --needed base-devel rust cargo
            cd /work/packaging/arch
            makepkg --noconfirm --cleanbuild --syncdeps --asroot
          '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipcode-linux-x86_64-installers
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            packaging/arch/*.pkg.tar.zst

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            packaging/arch/*.pkg.tar.zst
          name: ipcode-linux-x86_64-installers
